<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ranking Golden Fish</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #f5ede0;
    --bg2:    #ece3d0;
    --bg3:    #e2d7c2;
    --border: rgba(139,109,65,0.18);
    --text:   #2a1a08;
    --muted:  #7a6548;
    --gold:   #b07d10;
    --gold2:  #c8920e;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; background: var(--bg); font-family: 'Poppins', sans-serif; color: var(--text); }

  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    position: sticky; top: 0; z-index: 10;
  }
  .header-logo { font-size: 22px; }
  .header-title { font-size: 15px; font-weight: 800; color: var(--gold); letter-spacing: 0.05em; }
  .header-sub { font-size: 11px; color: var(--muted); }

  .semana-tabs {
    display: flex; gap: 6px; padding: 12px 16px 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .semana-tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border);
    background: var(--bg2); color: var(--muted); transition: all 0.15s;
  }
  .tab.active { background: var(--gold); color: white; border-color: var(--gold); }

  .list { padding: 10px 16px 32px; display: flex; flex-direction: column; gap: 8px; }

  .item {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    transition: transform 0.1s;
  }
  .item.mine {
    background: rgba(176,125,16,0.1);
    border-color: rgba(176,125,16,0.4);
    box-shadow: 0 0 0 1.5px rgba(176,125,16,0.25);
  }
  .item.top1 { background: rgba(255,215,0,0.12); border-color: rgba(200,146,14,0.5); }
  .item.top2 { background: rgba(192,192,192,0.12); border-color: rgba(150,150,150,0.4); }
  .item.top3 { background: rgba(205,127,50,0.1);  border-color: rgba(180,100,30,0.35); }

  .rank {
    font-size: 18px; font-weight: 900; min-width: 32px; text-align: center;
    color: var(--muted);
  }
  .rank.r1 { color: #c8920e; }
  .rank.r2 { color: #888; }
  .rank.r3 { color: #a0622a; }

  .info { flex: 1; min-width: 0; }
  .name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .pts {
    text-align: right; flex-shrink: 0;
  }
  .pts-num { font-size: 17px; font-weight: 800; color: var(--gold2); }
  .pts-label { font-size: 10px; color: var(--muted); }

  .mine-badge {
    font-size: 10px; font-weight: 700; color: var(--gold);
    background: rgba(176,125,16,0.12); padding: 2px 8px;
    border-radius: 10px; margin-top: 3px; display: inline-block;
  }

  .footer-note {
    text-align: center; font-size: 11px; color: var(--muted);
    padding: 0 20px 24px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏆</div>
  <div class="header-title">RANKING NACIONAL</div>
  <div class="header-sub" id="headerSub">Semana 3 · Actualizado hoy</div>
</div>

<div class="semana-tabs" id="tabs">
  <div class="tab" onclick="setTab(0)">Sem 1</div>
  <div class="tab" onclick="setTab(1)">Sem 2</div>
  <div class="tab active" onclick="setTab(2)">Sem 3</div>
  <div class="tab" onclick="setTab(3)">General</div>
</div>

<div class="list" id="list"></div>
<div class="footer-note">Solo se muestran los 20 mejores puntos · Los datos se actualizan en tiempo real</div>

<script>
const tg    = window.Telegram?.WebApp;
const param = tg?.initDataUnsafe?.start_param;
const PUNTO = param ? param.replace(/_/g, ' ') : new URLSearchParams(location.search).get('punto') || '';

const DATOS = [
  { nombre: 'NUESTRO BOGOTA',       semanas: [19.2, 20.1, 21.8], tendencia: 'up'   },
  { nombre: 'AEROPUERTO EL DORADO', semanas: [18.5, 19.8, 20.6], tendencia: 'up'   },
  { nombre: 'MAYORCA ETAPA 1',      semanas: [20.1, 19.5, 20.5], tendencia: 'up'   },
  { nombre: 'SANTA FE MED',         semanas: [18.0, 19.2, 19.6], tendencia: 'up'   },
  { nombre: 'CONECTA BOGOTA',       semanas: [17.8, 18.5, 18.9], tendencia: 'up'   },
  { nombre: 'UNICO BARRANQUILLA',   semanas: [17.2, 18.0, 18.5], tendencia: 'up'   },
  { nombre: 'CENTRO MAYOR',         semanas: [16.5, 17.4, 18.1], tendencia: 'up'   },
  { nombre: 'TITAN',                semanas: [17.9, 17.1, 17.8], tendencia: 'up'   },
  { nombre: 'OVIEDO',               semanas: [16.8, 16.5, 17.3], tendencia: 'down' },
  { nombre: 'ANDINO',               semanas: [15.2, 16.9, 17.0], tendencia: 'up'   },
  { nombre: 'GRAN ESTACION1',       semanas: [16.1, 16.4, 16.8], tendencia: 'up'   },
  { nombre: 'TESORO',               semanas: [14.8, 15.7, 16.5], tendencia: 'up'   },
  { nombre: 'SAN DIEGO',            semanas: [15.5, 15.2, 16.1], tendencia: 'up'   },
  { nombre: 'FONTANAR',             semanas: [13.9, 14.8, 15.7], tendencia: 'up'   },
  { nombre: 'HAYUELOS',             semanas: [14.2, 14.5, 15.3], tendencia: 'up'   },
  { nombre: 'PLAZA LAS AMERICAS',   semanas: [13.1, 14.2, 15.0], tendencia: 'up'   },
  { nombre: 'VIVA ENVIGADO',        semanas: [14.5, 13.8, 14.6], tendencia: 'up'   },
  { nombre: 'SANTAFE BOGOTA',       semanas: [13.8, 14.1, 14.2], tendencia: 'up'   },
  { nombre: 'SALITRE',              semanas: [12.4, 13.2, 13.8], tendencia: 'up'   },
  { nombre: 'COSMOCENTRO',          semanas: [11.8, 12.5, 13.1], tendencia: 'up'   },
];

let tabActual = 2;

function setTab(i) {
  tabActual = i;
  document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
  renderList();
}

function getPts(d, tab) {
  if (tab === 3) return parseFloat((d.semanas.reduce((a, b) => a + b, 0) / d.semanas.length).toFixed(1));
  return d.semanas[tab] ?? 0;
}

function renderList() {
  const sorted = [...DATOS].sort((a, b) => getPts(b, tabActual) - getPts(a, tabActual));
  const list = document.getElementById('list');
  list.innerHTML = '';

  sorted.forEach((d, i) => {
    const pos   = i + 1;
    const pts   = getPts(d, tabActual);
    const prev  = tabActual > 0 && tabActual < 3 ? d.semanas[tabActual - 1] : null;
    const flecha = prev !== null ? (pts > prev ? '▲' : pts < prev ? '▼' : '—') : '';
    const flechaColor = flecha === '▲' ? '#2a8a50' : flecha === '▼' ? '#c43030' : '#aaa';
    const esMio = PUNTO && d.nombre.toUpperCase() === PUNTO.toUpperCase();

    const rankClass = pos === 1 ? 'r1' : pos === 2 ? 'r2' : pos === 3 ? 'r3' : '';
    const itemClass = esMio ? 'mine' : pos === 1 ? 'top1' : pos === 2 ? 'top2' : pos === 3 ? 'top3' : '';
    const medal     = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos;

    list.innerHTML += `
      <div class="item ${itemClass}">
        <div class="rank ${rankClass}">${medal}</div>
        <div class="info">
          <div class="name">${d.nombre}</div>
          <div class="meta" style="display:flex;align-items:center;gap:6px;">
            ${flecha ? `<span style="color:${flechaColor};font-weight:700;font-size:12px;">${flecha} vs sem anterior</span>` : '<span>Promedio acumulado</span>'}
          </div>
          ${esMio ? '<span class="mine-badge">Tu punto</span>' : ''}
        </div>
        <div class="pts">
          <div class="pts-num">${pts}%</div>
          <div class="pts-label">% venta</div>
        </div>
      </div>`;
  });
}

renderList();
if (tg) tg.expand();
</script>
</body>
</html>
